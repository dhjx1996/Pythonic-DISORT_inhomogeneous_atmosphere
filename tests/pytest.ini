[pytest]
# Two partitions (see CLAUDE.md "Test precision partitions"):
#   default        : float32 production accuracy (fast; run every time)
#     pytest
#   float64 (slow) : tight-tolerance convergence/precision references
#     PYDISORT_RICCATI_JAX_X64=1 pytest -m float64
#
# `addopts` excludes the float64 partition by default; an explicit `-m float64`
# on the command line overrides it (last -m wins).
addopts = -m "not float64"
# Do NOT collect supplementary/ : it holds manual helper scripts (e.g.
# generate_reference.py), not pytest tests.
norecursedirs = supplementary .ipynb_checkpoints __pycache__ reference_results
markers =
    float64: stringent convergence/precision test requiring float64 (run via `PYDISORT_RICCATI_JAX_X64=1 pytest -m float64`)
